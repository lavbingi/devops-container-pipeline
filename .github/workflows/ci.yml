name: DevOps CI Pipeline
on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install pytest
      - run: pytest
      # Task 8: Generate Build Artifacts
      - name: Create Build Package
        run: zip -r build-package.zip .
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-build
          path: build-package.zip

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app
